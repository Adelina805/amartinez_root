<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="Adelina Martinez" content="Adelina Martinez's Timeline at SDSU: Contact" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Contact Adelina Martinez?</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
    <!-- FLYING STARS CONTAINER -->
    <div id="stars-container"></div>

    <!-- HEADER -->
    <site-header current="contact"></site-header>

    <main>
        <!-- CONTACT SECTION -->
        <section>
            <div class="container contact-container">
                <h1>Contact Adelina Martinez?</h1>

                <div class="column-layout">
                    <div class="column-left">
                        <svg id="spinning-star" viewBox="0 0 293 308" fill="none" xmlns="http://www.w3.org/2000/svg"
                            aria-label="spinning star">
                            <path
                                d="M292.775 153.921L196.399 201.485L180.945 307.842L105.927 230.881L1.74508e-05 249.049L50.0119 153.921L1.74508e-05 58.7926L105.927 76.9605L180.945 3.00454e-05L196.399 106.357L292.775 153.921Z"
                                fill="currentColor" />
                        </svg>
                    </div>

                    <div id="contact-form-shell">
                        <div class="column-right">
                            <form id="contact-form" class="contact-form" action="https://api.staticforms.dev/submit"
                                method="POST">
                                <input type="hidden" name="apiKey" value="sf_k00i25lh10imi45n131i6fmc" />

                                <input type="text" name="honeypot" style="position:absolute; left:-9999px;"
                                    tabindex="-1" autocomplete="off" />

                                <div class="form-group form-group-name">
                                    <label for="name" class="form-label">NAME</label>
                                    <input type="text" id="name" name="name" placeholder="Jane Doe"
                                        class="form-input input-name" required />
                                </div>

                                <div class="form-group form-group-email">
                                    <label for="email" class="form-label">EMAIL</label>
                                    <input type="email" id="email" name="email" placeholder="example@email"
                                        class="form-input input-email" required />
                                </div>

                                <div class="form-group form-group-message">
                                    <label for="message" class="form-label">MESSAGE</label>
                                    <textarea id="message" name="message" placeholder="Hello :D"
                                        class="form-textarea input-message" rows="6" required></textarea>
                                </div>

                                <div class="form-actions">
                                    <button type="submit" class="form-button submit-button">SEND TO ADELINA</button>
                                    <p class="form-status" aria-live="polite" style="margin:.5rem;"></p>
                                </div>

                            </form>
                        </div>

                    </div>


                </div>
                <p class="note"><i>You can also connect with me on <a
                            href="https://www.linkedin.com/in/adelina-martinez/" target="_blank">LinkedIn</a>. I
                        look
                        forward to hearing from you :)</i> </p>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <site-footer></site-footer>

    <!-- JS FILES -->
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
