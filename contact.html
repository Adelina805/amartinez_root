<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="description"
        content="Get in touch with Adelina Martinez, UX/UI designer and Computer Science student at SDSU. Let’s collaborate on thoughtful digital experiences." />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Contact Adelina Martinez?</title>
    <link rel="icon" href="stars/faq-star.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
    <!-- FLYING STARS CONTAINER -->
    <div id="stars-container"></div>

    <!-- HEADER -->
    <site-header current="contact"></site-header>

    <main>
        <!-- CONTACT SECTION -->
        <section class="hero-stars-section">
            <!-- Blurred dreamy star backdrop -->
            <hero-stars></hero-stars>
            <div class="container contact-container">
                <h1 class="page-title">Contact Adelina Martinez?</h1>

                <div class="column-layout">
                    <div class="column-left">
                        <svg id="spinning-star" viewBox="0 0 293 308" fill="none" xmlns="http://www.w3.org/2000/svg"
                            aria-label="spinning star">
                            <path
                                d="M292.775 153.921L196.399 201.485L180.945 307.842L105.927 230.881L1.74508e-05 249.049L50.0119 153.921L1.74508e-05 58.7926L105.927 76.9605L180.945 3.00454e-05L196.399 106.357L292.775 153.921Z"
                                fill="currentColor" />
                        </svg>
                    </div>

                    <div id="contact-form-shell">
                        <div class="column-right">
                            <form id="contact-form" class="contact-form" action="contact-handler.php" method="POST">

                                <input type="text" name="honeypot" style="position:absolute; left:-9999px;"
                                    tabindex="-1" autocomplete="off" />

                                <fieldset class="form-group form-group-first-name">
                                    <legend class="form-label">FIRST NAME</legend>
                                    <input type="text" id="first-name" name="first_name" placeholder="Jane"
                                        autocomplete="given-name" class="form-input input-first-name" required />
                                </fieldset>

                                <fieldset class="form-group form-group-last-name">
                                    <legend class="form-label">LAST NAME</legend>
                                    <input type="text" id="last-name" name="last_name" placeholder="Doe"
                                        autocomplete="family-name" class="form-input input-last-name" required />
                                </fieldset>

                                <fieldset class="form-group form-group-email">
                                    <legend class="form-label">EMAIL</legend>
                                    <input type="email" id="email" name="email" placeholder="example@email"
                                        autocomplete="email" class="form-input input-email" required />
                                </fieldset>

                                <fieldset class="form-group form-group-phone">
                                    <legend class="form-label">PHONE</legend>
                                    <input type="tel" id="phone" name="phone" placeholder="(619) 867-5309"
                                        autocomplete="tel" inputmode="tel" class="form-input input-phone" required />
                                </fieldset>

                                <fieldset class="form-group form-group-message">
                                    <legend class="form-label">MESSAGE</legend>
                                    <textarea id="message" name="message" placeholder="Hello :D"
                                        class="form-textarea input-message" rows="6" required></textarea>
                                </fieldset>

                                <fieldset class="form-group form-group-question">
                                    <legend class="form-label">HOW DID YOU FIND MY SITE?</legend>
                                    <select id="custom-question" name="custom_question"
                                        class="form-input input-question" required>
                                        <option value="" selected disabled>Select one</option>
                                        <option value="class_project">Class project</option>
                                        <option value="search_engine">Search engine</option>
                                        <option value="social_media">Social media</option>
                                        <option value="friend">Friend</option>
                                        <option value="other">Other</option>
                                    </select>
                                </fieldset>

                                <div class="form-actions">
                                    <button type="submit" class="form-button submit-button">SEND TO ADELINA</button>
                                    <p class="form-status" aria-live="polite"></p>
                                </div>

                            </form>
                        </div>

                    </div>


                </div>
                <p class="note"><i>You can also connect with me on <a
                            href="https://www.linkedin.com/in/adelina-martinez/" target="_blank">LinkedIn</a>. I
                        look
                        forward to hearing from you :)</i> </p>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <site-footer></site-footer>

    <!-- JS FILES -->
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/components/hero-stars.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
